<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 64 64" fill="none">
  <!-- 배경: 원형 코인 (다크 네이비 → 청록 그라데이션) -->
  <defs>
    <linearGradient id="coin" x1="0" y1="0" x2="64" y2="64" gradientUnits="userSpaceOnUse">
      <stop offset="0" stop-color="#0B1220"/>
      <stop offset="1" stop-color="#0E7490"/>
    </linearGradient>
    <linearGradient id="line" x1="8" y1="40" x2="56" y2="24" gradientUnits="userSpaceOnUse">
      <stop offset="0" stop-color="#22D3EE"/>
      <stop offset="1" stop-color="#A7F3D0"/>
    </linearGradient>
  </defs>
  <circle cx="32" cy="32" r="30" fill="url(#coin)" stroke="#22D3EE" stroke-width="2"/>
  <!-- 가격 상승 라인 차트 -->
  <polyline
    points="10,44 20,38 28,42 38,28 46,32 54,18"
    fill="none"
    stroke="url(#line)"
    stroke-width="3.5"
    stroke-linecap="round"
    stroke-linejoin="round"
  />
  <!-- 상승 화살표 꼭짓점 -->
  <circle cx="54" cy="18" r="3" fill="#A7F3D0"/>
  <!-- A (Auto) 이니셜 오버레이 -->
  <path d="M22 52 L27 40 L32 52 M24.5 48 L29.5 48"
    stroke="#F8FAFC"
    stroke-width="2.2"
    stroke-linecap="round"
    stroke-linejoin="round"
    fill="none"
    opacity="0.9"/>
</svg>
